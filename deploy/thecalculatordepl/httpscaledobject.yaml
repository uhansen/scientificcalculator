# HTTPScaledObject enables KEDA HTTP Add-on scale-to-zero for thecalculatorspin.
#
# Traffic flow (when scaled to zero):
#   Ingress → thecalculatorspin-proxy (ExternalName)
#     → keda-add-ons-http-interceptor-proxy.keda:8080  (buffers request + triggers scale-up)
#       → thecalculatorspin:80  (once pod is ready)
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: thecalculatorspin
  namespace: default
spec:
  hosts:
    - "localhost"
  scalingMetric:
    concurrency:
      targetValue: 10
  scaleTargetRef:
    name: thecalculatorspin
    kind: Deployment
    apiVersion: apps/v1
    service: thecalculatorspin
    port: 80
  replicas:
    min: 1
    max: 5
  scaledownPeriod: 60
