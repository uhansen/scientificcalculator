apiVersion: core.spinkube.dev/v1alpha1
kind: SpinApp
metadata:
  name: thecalculatorspin
spec:
  image: "ghcr.io/uhansen/thecalculatorspin:latest"
  replicas: 1
  executor: containerd-shim-spin
  imagePullSecrets:
    - name: ghcr-pull-secret
---
# ExternalName service that routes to the KEDA HTTP interceptor proxy.
# The Ingress sends traffic here so the interceptor can apply scale-to-zero.
apiVersion: v1
kind: Service
metadata:
  name: thecalculatorspin-proxy
spec:
  type: ExternalName
  externalName: keda-add-ons-http-interceptor-proxy.keda.svc.cluster.local
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
# Ingress routes all traffic through the KEDA interceptor proxy.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thecalculatorspin
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: thecalculatorspin-proxy
                port:
                  number: 8080
